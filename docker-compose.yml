services:
  postgres:
    image: postgres:16-alpine
    container_name: advanta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: advanta
      POSTGRES_PASSWORD: advanta
      POSTGRES_DB: advanta_ai
    ports:
      - "5432:5432"
    volumes:
      - advanta_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advanta -d advanta_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: advanta-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - advanta_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  advanta_postgres_data:
  advanta_redis_data:
