services:
  postgres:
    image: postgres:16-alpine
    container_name: adgeniehq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: adgeniehq
      POSTGRES_PASSWORD: adgeniehq
      POSTGRES_DB: adgeniehq_ai
    ports:
      - "5432:5432"
    volumes:
      - adgeniehq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adgeniehq -d adgeniehq_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: adgeniehq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - adgeniehq_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  adgeniehq_postgres_data:
  adgeniehq_redis_data:
