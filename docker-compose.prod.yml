# Production-shaped local stack. Use real managed Postgres + Redis in production.
#
# Bring up:
#   docker compose -f docker-compose.prod.yml up --build
#
# Migrate:
#   docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: adgeniehq
      POSTGRES_PASSWORD: adgeniehq
      POSTGRES_DB: adgeniehq_ai
    volumes:
      - adgeniehq_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adgeniehq -d adgeniehq_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - adgeniehq_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      # Dispatch slow tasks to the worker below instead of running them inline
      # in the request (which would block requests + risk proxy timeouts).
      WORKERS_ENABLED: "1"
      DATABASE_URL: postgresql+psycopg://adgeniehq:adgeniehq@postgres:5432/adgeniehq_ai
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:8080","http://localhost:5173"]'
      FRONTEND_URL: http://localhost:8080
      BACKEND_URL: http://localhost:8000
      APP_SECRET_KEY: ${APP_SECRET_KEY:?set APP_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8000:8000"

  # Background worker + beat scheduler in ONE process (single replica only).
  # IMPORTANT: `--beat` runs the scheduler here, so this service must stay at a
  # single replica. If you scale the worker out, split beat into its own
  # dedicated single-replica service first — otherwise the monthly fee accrual
  # and the autopilot scan would fire once per replica.
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--beat", "--loglevel=info", "--concurrency=4"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://adgeniehq:adgeniehq@postgres:5432/adgeniehq_ai
      REDIS_URL: redis://redis:6379/0
      APP_SECRET_KEY: ${APP_SECRET_KEY:?set APP_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_app.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    ports:
      - "8080:80"

volumes:
  adgeniehq_pg:
  adgeniehq_redis:
