server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed Vite assets aggressively.
    location ~* \.(?:js|css|svg|woff2?|ttf|png|jpg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every non-asset path renders index.html so client routing works.
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store";
    }

    # Health endpoint for load balancers / Render.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
