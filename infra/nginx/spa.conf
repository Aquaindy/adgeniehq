server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed Vite assets aggressively.
    location ~* \.(?:js|css|svg|woff2?|ttf|png|jpg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA fallback — every non-asset path renders index.html so client routing works.
    # NOTE: nginx `add_header` does NOT inherit into a location that sets its own
    # headers, so the security headers are repeated here (on the HTML document,
    # where the browsing-context protections matter most).
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS — only honored over HTTPS (Render/your LB terminates TLS). 2 years.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        # Content-Security-Policy. script-src is strict ('self') — the theme
        # bootstrap is externalized (public/theme-init.js) and the app bundle is
        # same-origin, so no 'unsafe-inline'/nonce is needed for scripts. Allowed
        # third parties: Paddle (checkout overlay/cdn), Google (login redirect),
        # rsms.me (Inter webfont). style-src needs 'unsafe-inline' for React's
        # inline style attributes (styles can't execute JS, so this is low-risk).
        #
        # connect-src MUST list your API origin. Default covers the Render
        # deployment (https://api.getadvanta.app) AND the docker-compose.prod
        # local stack (http://localhost:8000, ignored on real https hosts via
        # mixed-content rules). If you deploy the API elsewhere, update it.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.paddle.com https://*.paddle.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://rsms.me; font-src 'self' data: https://rsms.me; img-src 'self' data: blob: https:; connect-src 'self' https://api.getadvanta.app http://localhost:8000 https://*.paddle.com; frame-src https://*.paddle.com https://accounts.google.com; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'" always;
    }

    # Health endpoint for load balancers / Render.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
